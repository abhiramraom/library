<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shastra Library Catalog</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Global Styles */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f4f6f9; 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header Layout */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h2 { color: #1a2a6c; margin: 0; font-size: 28px; }
        
        /* Action Buttons */
        .btn {
            padding: 10px 16px; font-size: 14px; font-weight: bold;
            border-radius: 8px; border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #1a2a6c; color: white; }
        .btn-success { background: #2a9d8f; color: white; }
        .btn-warning { background: #feb47b; color: #333; }
        .btn-edit { background: #e2e8f0; color: #4a5568; padding: 6px 12px; font-size: 12px; margin-top: 10px; align-self: flex-start; }
        .btn-danger { background: #e63946; color: white; }

        /* Control Panels */
        .control-panel {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04); margin-bottom: 25px;
        }
        .search-box { 
            width: 100%; padding: 14px; font-size: 16px; border: 2px solid #e2e8f0; 
            border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; outline: none;
        }
        .search-box:focus { border-color: #1a2a6c; }
        .filters { display: flex; gap: 12px; flex-wrap: wrap; }
        select { 
            padding: 12px; font-size: 15px; border-radius: 8px; 
            border: 2px solid #e2e8f0; flex: 1; background-color: #fff;
            min-width: 200px; cursor: pointer; outline: none;
        }

        /* Library Grid Layout */
        .library-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px;
        }
        .card { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.03); border-top: 5px solid #1a2a6c; 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .card.nastika { border-top-color: #ff7e5f; }
        .card.shastra { border-top-color: #feb47b; }
        .card.scripture { border-top-color: #2a9d8f; }
        
        .title { font-size: 18px; font-weight: bold; color: #1a2a6c; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #718096; font-style: italic; margin-bottom: 12px; }
        .meta-row { font-size: 13px; color: #4a5568; margin-top: 6px; }
        .tags-row { margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { background: #edf2f7; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #4a5568; }
        .stats { font-size: 15px; color: #4a5568; margin-bottom: 15px; font-weight: bold; text-align: right; }

        /* Pop-up Modals Forms */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
            padding: 10px; box-sizing: border-box;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 500px;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .modal h3 { margin-top: 0; color: #1a2a6c; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #4a5568; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }

        .almirah-list-item {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px; border-bottom: 1px solid #edf2f7; font-size: 14px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            select { min-width: 100%; }
            .library-grid { grid-template-columns: 1fr; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>📚 Shastra Library Setup</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-warning" onclick="openModal('almirahModal')">🚪 Configure Almirahs</button>
            <button class="btn btn-primary" onclick="openModal('addModal')">➕ Add New Book</button>
            <button class="btn btn-success" onclick="backupData()">💾 Backup Database</button>
        </div>
    </div>
    
    <div class="control-panel">
        <input type="text" id="searchBar" class="search-box" placeholder="🔍 Search book title, author, editor, or keywords...">
        <div class="filters">
            <select id="mainCatFilter">
                <option value="">All Core Systems</option>
                <option value="Astika Darshana">Astika Darshanas</option>
                <option value="Nastika Darshana">Nastika Darshanas</option>
                <option value="Technical Shastra">Technical Shastras</option>
                <option value="Scripture & Lit">Scriptures & Lore</option>
                <option value="General">General Literature</option>
            </select>
            <select id="subCatFilter">
                <option value="">All Shastras/Darshanas</option>
                <option value="Vedanta">Vedanta</option>
                <option value="Nyaya">Nyaya</option>
                <option value="Samkhya">Samkhya</option>
                <option value="Yoga">Yoga</option>
                <option value="Mimamsa">Mimamsa</option>
                <option value="Vaisheshika">Vaisheshika</option>
                <option value="Bauddha">Bauddha</option>
                <option value="Jaina">Jaina</option>
                <option value="Vyakarana">Vyakarana</option>
                <option value="Jyotisha">Jyotisha</option>
                <option value="Ayurveda">Ayurveda</option>
            </select>
            <select id="almirahFilter">
                <option value="">All Physical Almirahs</option>
                <option value="Unassigned">Almirah Unassigned</option>
            </select>
        </div>
    </div>

    <div id="bookCount" class="stats">Loading library database...</div>
    <div id="libraryContainer" class="library-grid"></div>
</div>

<div id="almirahModal" class="modal">
    <div class="modal-content">
        <h3>🚪 Create & Name Almirahs</h3>
        <div class="form-group">
            <label>New Almirah Name / Code</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="newAlmirahName" placeholder="e.g., Almirah A (Vedanta Room)">
                <button class="btn btn-primary" onclick="addNewAlmirah()">Add</button>
            </div>
        </div>
        <label style="font-size:13px; font-weight:bold; color:#4a5568;">Current Registered Almirahs:</label>
        <div id="almirahListContainer" style="margin-top:10px; max-height:200px; overflow-y:auto; border:1px solid #edf2f7; padding:5px; border-radius:6px;">
            </div>
        <div style="display:flex; justify-content: flex-end; margin-top:20px;">
            <button class="btn btn-primary" onclick="closeModal('almirahModal')">Done</button>
        </div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>➕ Add Book to Catalog</h3>
        <form id="addForm" onsubmit="saveNewBook(event)">
            <div class="form-group"><label>Title *</label><input type="text" id="addTitle" required></div>
            <div class="form-group"><label>Sub Title</label><input type="text" id="addSubTitle"></div>
            <div class="form-group"><label>Author</label><input type="text" id="addAuthor"></div>
            <div class="form-group"><label>Publisher</label><input type="text" id="addPublisher"></div>
            <div class="form-group">
                <label>Assigned Almirah</label>
                <select id="addAlmirahSelect"></select>
            </div>
            <div class="form-group"><label>Shelf Position / Rack Number</label><input type="text" id="addRack" placeholder="e.g., Shelf 2, Row B"></div>
            <div class="form-group">
                <label>Main Category *</label>
                <select id="addMainCat" required>
                    <option value="Astika Darshana">Astika Darshana</option>
                    <option value="Nastika Darshana">Nastika Darshana</option>
                    <option value="Technical Shastra">Technical Shastra</option>
                    <option value="Scripture & Lit">Scripture & Lit</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="form-group"><label>Sub-Category</label><input type="text" id="addSubCat" placeholder="e.g., Vedanta"></div>
            <div class="form-group"><label>Language</label><input type="text" id="addLanguage" value="Sanskrit"></div>
            <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:20px;">
                <button type="button" class="btn" onclick="closeModal('addModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Book</button>
            </div>
        </form>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>📝 Edit Book Details</h3>
        <form id="editForm" onsubmit="updateBookDetails(event)">
            <input type="hidden" id="editBookId">
            <div class="form-group"><label>Title *</label><input type="text" id="editTitle" required></div>
            <div class="form-group"><label>Sub Title</label><input type="text" id="editSubTitle"></div>
            <div class="form-group"><label>Author</label><input type="text" id="editAuthor"></div>
            <div class="form-group"><label>Publisher</label><input type="text" id="editPublisher"></div>
            <div class="form-group">
                <label>Assigned Almirah</label>
                <select id="editAlmirahSelect"></select>
            </div>
            <div class="form-group"><label>Shelf Position / Rack Number</label><input type="text" id="editRack"></div>
            <div class="form-group">
                <label>Main Category *</label>
                <select id="editMainCat" required>
                    <option value="Astika Darshana">Astika Darshana</option>
                    <option value="Nastika Darshana">Nastika Darshana</option>
                    <option value="Technical Shastra">Technical Shastra</option>
                    <option value="Scripture & Lit">Scripture & Lit</option>
                    <option value="General">General</option>
                </select>
            </div>
            <div class="form-group"><label>Sub-Category</label><input type="text" id="editSubCat"></div>
            <div class="form-group"><label>Language</label><input type="text" id="editLanguage"></div>
            <div style="display:flex; gap:10px; justify-content: flex-end; margin-top:20px;">
                <button type="button" class="btn" onclick="closeModal('editModal')">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="deleteBook()">Delete</button>
                <button type="submit" class="btn btn-success">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    let booksData = [];
    let almirahs = ["Almirah Unassigned"];

    async function loadLibrary() {
        // Load Custom Almirahs Names from Storage
        const savedAlmirahs = localStorage.getItem('library_almirahs_list');
        if (savedAlmirahs) { almirahs = JSON.parse(savedAlmirahs); }
        updateAlmirahDropdowns();

        const localData = localStorage.getItem('local_shastra_library');
        if (localData) {
            booksData = JSON.parse(localData);
            displayBooks(booksData);
        } else {
            try {
                const response = await fetch('books.json');
                booksData = await response.json();
                localStorage.setItem('local_shastra_library', JSON.stringify(booksData));
                displayBooks(booksData);
            } catch (error) {
                document.getElementById('bookCount').innerText = "Error reading data.";
            }
        }
    }

    function updateAlmirahDropdowns() {
        const filters = document.getElementById('almirahFilter');
        const addSel = document.getElementById('addAlmirahSelect');
        const editSel = document.getElementById('editAlmirahSelect');
        
        filters.innerHTML = '<option value="">All Physical Almirahs</option>';
        addSel.innerHTML = '';
        editSel.innerHTML = '';

        almirahs.forEach(alm => {
            filters.innerHTML += `<option value="${alm}">${alm}</option>`;
            addSel.innerHTML += `<option value="${alm}">${alm}</option>`;
            editSel.innerHTML += `<option value="${alm}">${alm}</option>`;
        });

        // Update configuring modal display list
        const container = document.getElementById('almirahListContainer');
        container.innerHTML = '';
        almirahs.forEach((alm, idx) => {
            if(alm === "Almirah Unassigned") return;
            container.innerHTML += `
                <div class="almirah-list-item">
                    <span>🚪 ${alm}</span>
                    <button style="color:red; background:none; border:none; cursor:pointer;" onclick="deleteAlmirah(${idx})">❌</button>
                </div>`;
        });
    }

    function addNewAlmirah() {
        const name = document.getElementById('newAlmirahName').value.trim();
        if(name && !almirahs.includes(name)) {
            almirahs.push(name);
            localStorage.setItem('library_almirahs_list', JSON.stringify(almirahs));
            document.getElementById('newAlmirahName').value = '';
            updateAlmirahDropdowns();
        }
    }

    function deleteAlmirah(idx) {
        if(confirm("Delete this Almirah configuration designation? Books inside will revert to unassigned.")) {
            const removedName = almirahs[idx];
            almirahs.splice(idx, 1);
            
            // Clean up books pointing to deleted almirah names
            booksData.forEach(b => {
                if(b['Physical Location'] === removedName) b['Physical Location'] = "Almirah Unassigned";
            });
            
            localStorage.setItem('library_almirahs_list', JSON.stringify(almirahs));
            localStorage.setItem('local_shastra_library', JSON.stringify(booksData));
            updateAlmirahDropdowns();
            filterBooks();
        }
    }

    function displayBooks(books) {
        const container = document.getElementById('libraryContainer');
        document.getElementById('bookCount').innerText = `Displaying ${books.length} of ${booksData.length} books`;
        container.innerHTML = '';

        const visibleSlice = books.slice(0, 150); 
        
        visibleSlice.forEach(book => {
            const mainCat = book['Main Category'];
            let customClass = '';
            if (mainCat === 'Nastika Darshana') customClass = 'nastika';
            else if (mainCat === 'Technical Shastra') customClass = 'shastra';
            else if (mainCat === 'Scripture & Lit') customClass = 'scripture';
            
            const loc = book['Physical Location'] || 'Almirah Unassigned';
            
            const card = document.createElement('div');
            card.className = `card ${customClass}`;
            card.innerHTML = `
                <div>
                    <div class="title">${book.Title || 'Untitled'}</div>
                    <div class="subtitle">${book['Sub Title'] || ''}</div>
                </div>
                <div>
                    <div class="meta-row">👤 <b>Author/Editor:</b> ${book.Author || book.Editor || 'Not Listed'}</div>
                    <div class="meta-row">🏢 <b>Publisher:</b> ${book.Publishers || 'Not Listed'}</div>
                    <div class="meta-row">📍 <b>Almirah Placement:</b> <span style="color:#d63031; font-weight:700;">${loc}</span></div>
                    <div class="tags-row">
                        <span class="tag" style="background:#ebf8ff; color:#2b6cb0;">${book['Book ID']}</span>
                        <span class="tag">${book['Sub-Category'] || 'General'}</span>
                        <span class="tag" style="background:#f0fff4; color:#22543d;">${book.Language || 'Sanskrit'}</span>
                    </div>
                    <button class="btn btn-edit" onclick="openEditModal('${book['Book ID']}')">⚙️ Edit Info / Location</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterBooks() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const mainCat = document.getElementById('mainCatFilter').value;
        const subCat = document.getElementById('subCatFilter').value;
        const almFilter = document.getElementById('almirahFilter').value;

        const filtered = booksData.filter(book => {
            const matchesSearch = (book.Title && book.Title.toLowerCase().includes(query)) || 
                                  (book.Author && book.Author.toLowerCase().includes(query)) ||
                                  (book.Editor && book.Editor.toLowerCase().includes(query)) ||
                                  (book['Sub Title'] && book['Sub Title'].toLowerCase().includes(query));
            const matchesMain = mainCat === "" || book['Main Category'] === mainCat;
            const matchesSub = subCat === "" || book['Sub-Category'] === subCat;
            
            let bookLoc = book['Physical Location'] || "Almirah Unassigned";
            if(bookLoc === "") bookLoc = "Almirah Unassigned";
            const matchesAlm = almFilter === "" || bookLoc === almFilter;

            return matchesSearch && matchesMain && matchesSub && matchesAlm;
        });

        displayBooks(filtered);
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveNewBook(e) {
        e.preventDefault();
        const nextId = 'LIB-' + String(booksData.length + 1).padStart(4, '0');
        const almVal = document.getElementById('addAlmirahSelect').value;
        const rackVal = document.getElementById('addRack').value.trim();
        const finalLocation = rackVal ? `${almVal} (${rackVal})` : almVal;
        
        const newBook = {
            "Book ID": nextId,
            "Title": document.getElementById('addTitle').value,
            "Sub Title": document.getElementById('addSubTitle').value,
            "Author": document.getElementById('addAuthor').value,
            "Publishers": document.getElementById('addPublisher').value,
            "Physical Location": finalLocation,
            "Main Category": document.getElementById('addMainCat').value,
            "Sub-Category": document.getElementById('addSubCat').value || "General",
            "Language": document.getElementById('addLanguage').value || "Sanskrit",
            "Status": "Available"
        };

        booksData.unshift(newBook);
        localStorage.setItem('local_shastra_library', JSON.stringify(booksData));
        closeModal('addModal');
        document.getElementById('addForm').reset();
        filterBooks();
    }

    function openEditModal(bookId) {
        const book = booksData.find(b => b['Book ID'] === bookId);
        if (!book) return;

        document.getElementById('editBookId').value = book['Book ID'];
        document.getElementById('editTitle').value = book.Title || '';
        document.getElementById('editSubTitle').value = book['Sub Title'] || '';
        document.getElementById('editAuthor').value = book.Author || book.Editor || '';
        document.getElementById('editPublisher').value = book.Publishers || '';
        
        // Extract Almirah base string selection
        let currentLocation = book['Physical Location'] || "Almirah Unassigned";
        let foundAlm = "Almirah Unassigned";
        let foundRack = "";

        for (let alm of almirahs) {
            if (currentLocation.startsWith(alm) && alm !== "Almirah Unassigned") {
                foundAlm = alm;
                foundRack = currentLocation.replace(alm, "").replace(/[()]/g, "").trim();
                break;
            }
        }
        
        document.getElementById('editAlmirahSelect').value = foundAlm;
        document.getElementById('editRack').value = foundRack;
        document.getElementById('editMainCat').value = book['Main Category'] || 'Astika Darshana';
        document.getElementById('editSubCat').value = book['Sub-Category'] || '';
        document.getElementById('editLanguage').value = book.Language || 'Sanskrit';

        openModal('editModal');
    }

    function updateBookDetails(e) {
        e.preventDefault();
        const id = document.getElementById('editBookId').value;
        const index = booksData.findIndex(b => b['Book ID'] === id);
        
        if (index !== -1) {
            const almVal = document.getElementById('editAlmirahSelect').value;
            const rackVal = document.getElementById('editRack').value.trim();
            const finalLocation = rackVal ? `${almVal} (${rackVal})` : almVal;

            booksData[index].Title = document.getElementById('editTitle').value;
            booksData[index]['Sub Title'] = document.getElementById('editSubTitle').value;
            booksData[index].Author = document.getElementById('editAuthor').value;
            booksData[index].Publishers = document.getElementById('editPublisher').value;
            booksData[index]['Physical Location'] = finalLocation;
            booksData[index]['Main Category'] = document.getElementById('editMainCat').value;
            booksData[index]['Sub-Category'] = document.getElementById('editSubCat').value;
            booksData[index].Language = document.getElementById('editLanguage').value;
            
            localStorage.setItem('local_shastra_library', JSON.stringify(booksData));
            closeModal('editModal');
            filterBooks();
        }
    }

    function deleteBook() {
        const id = document.getElementById('editBookId').value;
        if(confirm(`Permanently delete book ${id}?`)) {
            booksData = booksData.filter(b => b['Book ID'] !== id);
            localStorage.setItem('local_shastra_library', JSON.stringify(booksData));
            closeModal('editModal');
            filterBooks();
        }
    }

    function backupData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(booksData, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "books.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    document.getElementById('searchBar').addEventListener('input', filterBooks);
    document.getElementById('mainCatFilter').addEventListener('change', filterBooks);
    document.getElementById('subCatFilter').addEventListener('change', filterBooks);
    document.getElementById('almirahFilter').addEventListener('change', filterBooks);
    window.onload = loadLibrary;
</script>
</body>
</html>
